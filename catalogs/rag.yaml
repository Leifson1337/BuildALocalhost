# RAG stack catalog (Stage 2). Vector DBs, embedding/reranker serving, document apps.

vector_dbs:
  - id: qdrant
    name: Qdrant
    default: true
    image: qdrant/qdrant:v1.12.4
    internal_port: 6333
    volume: qdrant_data
  - id: weaviate
    name: Weaviate
    image: semitechnologies/weaviate:1.27.0
    internal_port: 8080
    volume: weaviate_data
  - id: milvus
    name: Milvus
    image: milvusdb/milvus:v2.5.0
    internal_port: 19530
    volume: milvus_data
    notes: Requires etcd + minio; heavier — wizard warns.
  - id: pgvector
    name: pgvector (in shared Postgres)
    image: pgvector/pgvector:pg16     # replaces postgres image when selected
    internal_port: 5432
    notes: Reuses the shared Postgres; no extra container.
  - id: chroma
    name: Chroma
    image: chromadb/chroma:0.5.20
    internal_port: 8000
    volume: chroma_data
  - id: leann
    name: LEANN (low-storage graph vector index)
    # LEANN is primarily a library (graph index that recomputes embeddings to cut storage
    # ~97%). Served here via a thin wrapper image. SET/BUILD the real image and verify the
    # API; the default below is a placeholder (overridable via ${LEANN_IMAGE}).
    image: "leann/leann-server:latest"
    image_env: LEANN_IMAGE
    internal_port: 8000
    volume: leann_data
    kind: low_storage_graph_index
    verify_image: true
    best_for: [low storage, personal/large corpora, edge]

# Vector quantization / compression strategies for the index (storage + speed).
# scalar/product/binary are native to several DBs (e.g. Qdrant). turboquant/turbovec are
# external efficiency methods — selectable, but flagged to verify the integration.
vector_quantization:
  - id: none
    name: Keine (volle Präzision)
  - id: scalar
    name: Scalar quantization (int8)
    native: [qdrant]
  - id: product
    name: Product quantization
    native: [qdrant]
  - id: binary
    name: Binary quantization (schnellster, grobster)
    native: [qdrant]
  - id: turboquant
    name: TurboQuant (data-oblivious quantization)
    external: true
    verify_integration: true
    best_for: [maximale Vektor-Kompression]
  - id: turbovec
    name: TurboVec (vektorisierte/quantisierte Suche)
    external: true
    verify_integration: true
    best_for: [maximaler Suchdurchsatz]

# Best-practice RAG quality switches (applied by the efficient preset).
quality_defaults:
  hybrid_search: true        # dense + sparse (BM25) retrieval
  reranking: true
  source_citations: true
  chunk_size: 512
  chunk_overlap: 64

# Embedding + reranker served via HF Text Embeddings Inference (TEI), OpenAI-ish API.
embeddings:
  serving:
    id: tei
    name: HF Text Embeddings Inference
    image: ghcr.io/huggingface/text-embeddings-inference:1.6
    image_cpu: ghcr.io/huggingface/text-embeddings-inference:cpu-1.6
    internal_port: 80
  default_model: BAAI/bge-m3

reranker:
  serving:
    id: tei-rerank
    name: TEI (reranker mode)
    image: ghcr.io/huggingface/text-embeddings-inference:1.6
    internal_port: 80
  default_model: BAAI/bge-reranker-v2-m3

document_apps:
  - id: anythingllm
    name: AnythingLLM
    image: mintplexlabs/anythingllm:latest
    internal_port: 3001
    volume: anythingllm_data
