# Profile: multi_h100
# production tuned for multi-GPU nodes. tensor_parallel_size stays 'auto' so the
# recommendation engine fills it from the detected interconnect/GPU count.

profile_name: multi_h100
description: Multi-GPU production — automatische Tensor-Parallelität, getrennte Caches.

runtime:
  type: docker_compose
  nvidia_container_toolkit: true

inference:
  engine: vllm
  model: null
  dtype: bfloat16
  tensor_parallel_size: auto       # filled from GPU topology
  pipeline_parallel_size: auto
  gpu_memory_utilization: 0.92
  enable_prefix_caching: true
  enable_chunked_prefill: true
  max_model_len: auto

gateway:
  type: litellm
  openai_compatible: true
  rate_limits: true
  per_user_keys: true
  router:
    routing_strategy: latency-based-routing
    num_retries: 2
    timeout: 120

web:
  reverse_proxy: traefik
  tls: letsencrypt
  auth: litellm_keys
  domains: {api: null, webui: null, grafana: null}
  ui: [open-webui]

rag:
  enabled: false

mcp:
  enabled: false

monitoring:
  enabled: true
  prometheus: true
  grafana: true
  dcgm_exporter: true
  node_exporter: true
  cadvisor: true

security:
  profile: public_secure
  expose_only_reverse_proxy: true
  internal_networks: true
  no_direct_gpu_api_exposure: true
  audit_logs: true
  rate_limit_per_minute: 120
  max_context_tokens: 65536
  max_output_tokens: 8192
