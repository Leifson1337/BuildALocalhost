# Profile: rag
# production + Qdrant vector DB + embedding/reranker serving + AnythingLLM.

profile_name: rag
description: RAG-Stack — production + Qdrant + Embeddings + Reranker + AnythingLLM.

runtime:
  type: docker_compose
  nvidia_container_toolkit: true

inference:
  engine: vllm
  model: null
  dtype: bfloat16
  tensor_parallel_size: auto
  pipeline_parallel_size: 1
  gpu_memory_utilization: 0.90
  enable_prefix_caching: true
  enable_chunked_prefill: true
  max_model_len: auto

gateway:
  type: litellm
  openai_compatible: true
  rate_limits: true
  per_user_keys: true

web:
  reverse_proxy: traefik
  tls: letsencrypt
  auth: litellm_keys
  domains: {api: null, webui: null, grafana: null}
  ui: [open-webui]

rag:
  enabled: true
  vector_db: qdrant
  embeddings_model: BAAI/bge-m3
  reranker_model: BAAI/bge-reranker-v2-m3
  document_app: anythingllm

mcp:
  enabled: false

monitoring:
  enabled: true
  prometheus: true
  grafana: true
  dcgm_exporter: true
  node_exporter: true
  cadvisor: true

security:
  profile: public_secure
  expose_only_reverse_proxy: true
  internal_networks: true
  no_direct_gpu_api_exposure: true
  audit_logs: true
  rate_limit_per_minute: 60
  max_context_tokens: 32768
  max_output_tokens: 4096
