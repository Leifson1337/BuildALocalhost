# Example plugin (disabled). Set enabled: true to register this engine in the catalog.
name: example-custom-engine
type: inference_engine
enabled: false
requires:
  - nvidia_gpu
  - docker
provides:
  engines:
    - id: my-custom-engine
      name: My Custom OpenAI-compatible Engine
      api: openai-compatible
      image: registry.example.com/my-engine:1.0
      default_port: 8000
      gpu: required
      supports:
        tensor_parallel: true
        quantization: [awq, gptq, fp8]
      best_for:
        - example only — replace with your engine
